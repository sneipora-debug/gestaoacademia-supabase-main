<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equipe - Sou Fitness</title>
    <link rel="stylesheet" href="alunos.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      .container { display: flex; min-height: 100vh; }
      #menu { width: 260px; background: #111; min-height: 100vh; }
      main { flex: 1; padding: 30px; background: var(--bg); overflow-y: auto; color: white; }
      .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
      .modal-senha { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
      .modal-senha-content { background: var(--card); margin: 10% auto; padding: 25px; border: 1px solid var(--border); width: 90%; max-width: 400px; border-radius: 20px; }
      .modal-senha-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
      .btn-fechar-modal { background: rgba(255,255,255,0.08); border: none; color: #aab3c5; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; }
      .input-senha-container { position: relative; display: flex; align-items: center; margin-top: 5px; }

      @media (max-width: 768px) {
        .container { flex-direction: column; }
        #menu { width: 100%; min-height: auto; }
        main { padding: 15px; }
        .form-grid { grid-template-columns: 1fr; }
        header h1 { font-size: 1.8rem; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="menu"></div>
      <main>
        <div class="user-header"></div>
        <header>
          <h1>Gerenciamento de Equipe</h1>
          <p>Cadastre e gerencie os administradores, professores e colaboradores do sistema.</p>
        </header>

        <div class="card">
          <h2 id="tituloForm">Cadastrar Novo Integrante</h2>
          <form id="formUsuario">
            <div class="form-grid">
              <div class="form-group full-width">
                <label for="user_nome">Nome Completo</label>
                <input type="text" id="user_nome" required placeholder="Ex: Elói Beilke" />
              </div>
              <div class="form-group">
                <label for="user_email">E-mail (Login)</label>
                <input type="email" id="user_email" required placeholder="email@exemplo.com" />
              </div>
              <div class="form-group">
                <label for="user_cpf">CPF</label>
                <input type="text" id="user_cpf" placeholder="000.000.000-00" />
              </div>
              <div class="form-group">
                <label for="user_role">Nível de Acesso</label>
                <select id="user_role">
                  <option value="master">Administrador Geral (Sistema)</option>
                  <option value="admin">Empresário (Dono da Unidade)</option>
                  <option value="professor">Professor / Trainer</option>
                  <option value="staff">Recepcionista / Colaborador</option>
                </select>
              </div>
              <div class="form-group">
                <label for="user_password">Senha (Deixe em branco para não alterar)</label>
                <div class="input-senha-container">
                  <input type="password" id="user_password" placeholder="Nova senha" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0f172a; color: white; padding-right: 45px;">
                  <span id="toggleSenhaForm" style="position: absolute; right: 15px; cursor: pointer; font-size: 18px;">👁️</span>
                </div>
              </div>
            </div>
            <div style="margin-top: 15px; display: flex; gap: 10px;">
              <button type="submit" class="btn-salvar">Salvar Integrante</button>
              <button type="button" id="btnCancelar" style="display:none; background:#334155;">Cancelar</button>
            </div>
          </form>
        </div>

        <div class="card" style="margin-top: 30px">
          <h2>📧 Solicitações de Recuperação de Senha</h2>
          <div id="listaSolicitacoes"></div>
        </div>

        <div class="card" style="margin-top: 30px">
          <h2>Integrantes Ativos</h2>
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Cargo</th>
                <th>Acesso</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabelaUsuarios"></tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- Modal Gerenciar Senha (Estilo Agro Pops Bello) -->
    <div id="modalSenha" class="modal-senha">
      <div class="modal-senha-content">
        <div class="modal-senha-header">
          <h2 style="margin:0; font-size: 1.2rem; color: white;">Gerenciar Acesso</h2>
          <button class="btn-fechar-modal" onclick="window.fecharModalSenha()">✕</button>
        </div>
        <div class="modal-body">
          <p id="infoUsuarioSenha" style="font-size: 14px; color: var(--muted); margin-bottom: 20px;"></p>
          <div class="form-group" style="margin-bottom: 20px;">
            <label for="nova_senha_admin" style="font-size: 13px; color: #cbd5e1;">Nova Senha Provisória</label>
            <div class="input-senha-container">
              <input type="password" id="nova_senha_admin" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0f172a; color: white; padding-right: 45px;" placeholder="Mínimo 6 caracteres">
              <span id="toggleSenhaAdmin" style="position: absolute; right: 15px; cursor: pointer; font-size: 18px;">👁️</span>
            </div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 10px;">
            <button id="btnEnviarEmailRecuperacao" class="btn-salvar" style="background: #334155; width: 100%;">📧 Enviar E-mail de Recuperação</button>
            <button id="btnSalvarSenhaManual" class="btn-salvar" style="width: 100%;">💾 Salvar Senha Manual</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="usuarios.js"></script>
    <script>
      fetch("menu.html").then(res => res.text()).then(html => document.getElementById("menu").innerHTML = html);
    </script>
  </body>
</html>
