<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sou Fitness Dashboard</title>

    <link rel="stylesheet" href="alunos.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <div class="container">
      <div id="menu"></div>
            
      <main>
          <div class="user-header"></div>
          <header>
            <h1>Dashboard Sou Fitness</h1>
            <p>Visão geral do desempenho da sua academia</p>
          </header>

          <div class="dashboard-grid">
              <div class="card-stats">
                  <h3>👥 Alunos Ativos</h3>
                  <p id="alunosAtivos">0</p>
              </div>
              <div class="card-stats">
                  <h3>💵 Recebido no Mês</h3>
                  <p id="receitaMensal">R$ 0,00</p>
              </div>
              <div class="card-stats">
                  <h3>💰 A Receber (Mês)</h3>
                  <p id="totalPendenteMes">R$ 0,00</p>
              </div>
              <div class="card-stats" style="border-color: #EF4444;">
                  <h3>⚠️ Inadimplentes</h3>
                  <p id="totalInadimplentes" style="color: #EF4444;">R$ 0,00</p>
              </div>
              <div class="card-stats">
                  <h3>📈 Receita Prevista</h3>
                  <p id="receitaPrevista">R$ 0,00</p>
              </div>
          </div>

          <div class="card">
              <h2>Distribuição por Plano</h2>
              <div style="max-width: 400px; margin: 0 auto;">
                  <canvas id="graficoPlanos"></canvas>
              </div>
          </div>
      </main>
    </div>

    <!-- Linkando o script para carregar as estatísticas -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="dashboard.js"></script>
  
<script>
fetch("menu.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("menu").innerHTML = data;
  });
</script>
  </body>
</html>
