<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sou Fitness Dashboard</title>

    <link rel="stylesheet" href="alunos.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <style>
    .container { display: flex; min-height: 100vh; }
    #menu { width: 260px; background: #111; min-height: 100vh; }
    main { flex: 1; padding: 30px; background: var(--bg); overflow-y: auto; color: white; }
    h1, h2, h3 { color: white; }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card-stats { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); transition: transform 0.2s; }
    .card-stats:hover { transform: translateY(-5px); }
    .card-stats h3 { font-size: 0.85rem; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-stats p { font-size: 1.6rem; font-weight: 700; margin: 0; color: var(--primary); }

    @media (max-width: 768px) {
        .container { flex-direction: column; }
        #menu { width: 100%; min-height: auto; }
        main { padding: 15px; }
    }
  </style>

  <body>
    <div class="container">
      <div id="menu"></div>
            
      <main>
          <div class="user-header"></div>
          <header>
            <h1>Dashboard Sou Fitness</h1>
            <p>Visão geral do desempenho da sua academia</p>
          </header>

          <div class="dashboard-grid">
              <div class="card-stats">
                  <h3>👥 Alunos Ativos</h3>
                  <p id="alunosAtivos">0</p>
              </div>
              <div class="card-stats">
                  <h3>💵 Recebido no Mês</h3>
                  <p id="receitaMensal">R$ 0,00</p>
              </div>
              <div class="card-stats">
                  <h3>💰 A Receber (Mês)</h3>
                  <p id="totalPendenteMes">R$ 0,00</p>
              </div>
              <div class="card-stats" style="border-color: #EF4444;">
                  <h3>⚠️ Inadimplentes</h3>
                  <p id="totalInadimplentes" style="color: #EF4444;">R$ 0,00</p>
              </div>
              <div class="card-stats">
                  <h3>📈 Receita Prevista</h3>
                  <p id="receitaPrevista">R$ 0,00</p>
              </div>
          </div>

          <div class="card">
              <h2>Distribuição por Plano</h2>
              <div style="max-width: 400px; margin: 0 auto;">
                  <canvas id="graficoPlanos"></canvas>
              </div>
          </div>
      </main>
    </div>

    <!-- Linkando o script para carregar as estatísticas -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="dashboard.js"></script>
  
<script>
fetch("menu.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("menu").innerHTML = data;
  });
</script>
  </body>
</html>
