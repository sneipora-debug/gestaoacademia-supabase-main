<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sou Fitness</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="alunos.css"> <!-- Necessário para os Toasts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-screen">
        <div class="login-card">
            <header class="header">
                <div class="brand">
                    <span class="brand-name">SOU FITNESS</span>
                    <span class="brand-sub">SISTEMA DE GESTÃO</span>
                </div>
            </header>

            <main class="content">
                <div class="welcome-text">
                    <h2>Painel Administrativo</h2>
                    <p>Acesse as ferramentas de controle e gestão da sua academia.</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="input-group">
                        <label for="email">E-mail Corporativo</label>
                        <div class="input-container">
                            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <input type="email" id="email" placeholder="nome@empresa.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Senha de Acesso</label>
                    <div class="input-container">
                        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="password" placeholder="Senha" required>
                        <button type="button" class="btn-toggle-password" id="togglePassword">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>

                <div class="biometry-row">
                    <span>Login por biometria</span>
                    <label class="modern-switch">
                        <input type="checkbox" id="biometryToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </form>
        </main>

        <footer class="footer">
            <button type="submit" form="loginForm" class="btn-entrar">Entrar</button>
            <div class="footer-links">
                <a href="#" id="btnRecuperar">Esqueci minha senha</a>
                <a href="#" id="btnCadastrar">Criar conta</a>
            </div>
        </footer>
    </div>
    <!-- O Supabase deve vir antes do módulo para garantir que window.supabase exista -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="login.js"></script>
</body>
</html>
