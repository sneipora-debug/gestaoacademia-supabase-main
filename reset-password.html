<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha - Sou Fitness</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-screen">
        <div class="login-card">
            <header class="header">
                <div class="brand">
                    <span class="brand-name">SOU FITNESS</span>
                    <span class="brand-sub">RECUPERAÇÃO DE ACESSO</span>
                </div>
            </header>

            <main class="content">
                <div class="welcome-text">
                    <h2>Nova Senha</h2>
                    <p>Crie uma nova credencial segura para acessar o painel.</p>
                </div>

                <form id="resetForm" class="login-form">
                    <div class="input-group">
                        <label for="newPassword">Nova Senha</label>
                        <div class="input-container">
                            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Confirmar Nova Senha</label>
                        <div class="input-container">
                            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <input type="password" id="confirmPassword" placeholder="Repita a nova senha" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-entrar">Atualizar e Entrar</button>
                </form>
            </main>

            <footer class="footer">
                <p>Proteção de conta Sou Fitness</p>
            </footer>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="reset-password.js"></script>
</body>
</html>
