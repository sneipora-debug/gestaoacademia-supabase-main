<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#111"></rect>

  <!-- Ícone esquerdo -->
  <g transform="translate(120,110) rotate(-15)">
    <rect x="0" y="0" width="20" height="120" fill="#c9b458"></rect>
    <rect x="30" y="0" width="20" height="120" fill="#c9b458"></rect>
    <rect x="60" y="0" width="20" height="120" fill="#c9b458"></rect>
    <rect x="90" y="0" width="20" height="120" fill="#c9b458"></rect>
    <rect x="120" y="0" width="20" height="120" fill="#c9b458"></rect>
  </g>

  <!-- Texto principal -->
  <text x="600" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="90" font-weight="bold" fill="#d7c76a">
    GERAÇÃO
  </text>

  <!-- Linha curva -->
  <path d="M250 185 Q600 140 950 185" fill="none" stroke="#c9b458" stroke-width="8"></path>

  <!-- Subtítulo -->
