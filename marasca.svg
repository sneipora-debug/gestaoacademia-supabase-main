  </text>

  <!-- Ícone direito -->
  <g transform="translate(950,110) rotate(15)">
    <rect x="0" y="0" width="20" height="120" fill="#c9b458"></rect>
    <rect x="30" y="0" width="20" height="120" fill="#c9b458"></rect>
    <rect x="60" y="0" width="20" height="120" fill="#c9b458"></rect>
    <rect x="90" y="0" width="20" height="120" fill="#c9b458"></rect>
    <rect x="120" y="0" width="20" height="120" fill="#c9b458"></rect>
  </g>
